<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>关卡管理后台 - 星界神话</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        min-height: 100vh;
        background: linear-gradient(135deg, #0c0d1f 0%, #1a1b3c 50%, #0c0d1f 100%);
        font-family: 'Microsoft YaHei', sans-serif;
        color: #fff;
        overflow-x: hidden;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 30px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 2px solid rgba(100, 150, 255, 0.3);
      }
      .header h1 {
        font-size: 32px;
        background: linear-gradient(90deg, #a0c4ff, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .header-actions {
        display: flex;
        gap: 15px;
      }
      .btn {
        padding: 12px 24px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
      }
      .btn-secondary {
        background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
      }
      .btn-danger {
        background: linear-gradient(135deg, #e53e3e 0%, #c53030 100%);
      }
      .btn-success {
        background: linear-gradient(135deg, #38a169 0%, #2f855a 100%);
      }
      .btn-sm {
        padding: 6px 12px;
        font-size: 12px;
      }
      .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        background: rgba(100, 150, 255, 0.1);
        border: 1px solid rgba(100, 150, 255, 0.3);
        border-radius: 10px;
        margin-bottom: 25px;
      }
      .status-indicator {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .status-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #e53e3e;
        animation: pulse 2s infinite;
      }
      .status-dot.online {
        background: #38a169;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .levels-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 20px;
      }
      .level-card {
        background: rgba(20, 25, 50, 0.8);
        border: 1px solid rgba(100, 150, 255, 0.2);
        border-radius: 15px;
        padding: 25px;
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
      }
      .level-card:hover {
        border-color: rgba(100, 150, 255, 0.5);
        transform: translateY(-3px);
        box-shadow: 0 10px 40px rgba(102, 126, 234, 0.2);
      }
      .level-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #667eea, #764ba2);
      }
      .level-id {
        position: absolute;
        top: 15px;
        right: 15px;
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 16px;
      }
      .level-name {
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 8px;
        color: #a0c4ff;
      }
      .level-creature {
        font-size: 16px;
        color: #ffd700;
        margin-bottom: 12px;
      }
      .level-desc {
        font-size: 13px;
        color: #a0aec0;
        line-height: 1.6;
        margin-bottom: 15px;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .level-stats {
        display: flex;
        gap: 15px;
        margin-bottom: 15px;
        font-size: 13px;
      }
      .stat-item {
        background: rgba(100, 150, 255, 0.15);
        padding: 6px 12px;
        border-radius: 6px;
        color: #a0c4ff;
      }
      .level-actions {
        display: flex;
        gap: 10px;
      }
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 20px;
      }
      .modal-overlay.show {
        display: flex;
      }
      .modal {
        background: linear-gradient(135deg, #1a1b3c 0%, #0c0d1f 100%);
        border: 2px solid rgba(100, 150, 255, 0.3);
        border-radius: 20px;
        padding: 35px;
        width: 100%;
        max-width: 900px;
        max-height: 90vh;
        overflow-y: auto;
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        padding-bottom: 15px;
        border-bottom: 1px solid rgba(100, 150, 255, 0.2);
      }
      .modal-header h2 {
        font-size: 24px;
        color: #a0c4ff;
      }
      .close-btn {
        background: none;
        border: none;
        color: #a0aec0;
        font-size: 28px;
        cursor: pointer;
        transition: color 0.3s;
      }
      .close-btn:hover {
        color: #fff;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        color: #a0c4ff;
        font-weight: 500;
      }
      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 100%;
        padding: 12px 15px;
        background: rgba(100, 150, 255, 0.1);
        border: 1px solid rgba(100, 150, 255, 0.3);
        border-radius: 8px;
        color: #fff;
        font-size: 14px;
        transition: all 0.3s;
        font-family: inherit;
      }
      .form-group input:focus,
      .form-group textarea:focus,
      .form-group select:focus {
        outline: none;
        border-color: #667eea;
        background: rgba(100, 150, 255, 0.15);
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
      }
      .form-group textarea {
        resize: vertical;
        min-height: 80px;
      }
      .form-row {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }
      .form-row-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
      }
      .section-title {
        font-size: 18px;
        color: #ffd700;
        margin: 25px 0 15px 0;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(255, 215, 0, 0.2);
      }
      .list-container {
        background: rgba(100, 150, 255, 0.05);
        border: 1px solid rgba(100, 150, 255, 0.15);
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 15px;
      }
      .list-item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        padding: 12px;
        background: rgba(100, 150, 255, 0.08);
        border-radius: 8px;
        margin-bottom: 10px;
        align-items: start;
      }
      .list-item:last-child {
        margin-bottom: 0;
      }
      .list-item-fields {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      .list-item-fields.edge-fields {
        grid-template-columns: 1fr 1fr 1fr;
      }
      .mini-input {
        padding: 8px 10px;
        font-size: 12px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        color: #fff;
        width: 100%;
      }
      .mini-input:focus {
        outline: none;
        border-color: #667eea;
      }
      .remove-btn {
        background: rgba(229, 62, 62, 0.2);
        border: 1px solid rgba(229, 62, 62, 0.4);
        color: #fc8181;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.3s;
      }
      .remove-btn:hover {
        background: rgba(229, 62, 62, 0.4);
      }
      .add-btn {
        width: 100%;
        padding: 10px;
        background: rgba(56, 161, 105, 0.15);
        border: 1px dashed rgba(56, 161, 105, 0.4);
        color: #68d391;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.3s;
      }
      .add-btn:hover {
        background: rgba(56, 161, 105, 0.25);
        border-style: solid;
      }
      .validation-errors {
        background: rgba(229, 62, 62, 0.1);
        border: 1px solid rgba(229, 62, 62, 0.3);
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 20px;
        display: none;
      }
      .validation-errors.show {
        display: block;
      }
      .validation-errors h4 {
        color: #fc8181;
        margin-bottom: 10px;
        font-size: 14px;
      }
      .validation-errors ul {
        list-style: none;
      }
      .validation-errors li {
        color: #fed7d7;
        font-size: 13px;
        padding: 4px 0;
        padding-left: 20px;
        position: relative;
      }
      .validation-errors li::before {
        content: '•';
        position: absolute;
        left: 5px;
        color: #e53e3e;
      }
      .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 15px;
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid rgba(100, 150, 255, 0.2);
      }
      .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 25px;
        border-radius: 10px;
        color: #fff;
        font-size: 14px;
        z-index: 2000;
        transform: translateX(120%);
        transition: transform 0.3s ease;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .toast.show {
        transform: translateX(0);
      }
      .toast.success {
        background: linear-gradient(135deg, #38a169 0%, #2f855a 100%);
      }
      .toast.error {
        background: linear-gradient(135deg, #e53e3e 0%, #c53030 100%);
      }
      .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 60px 20px;
        color: #a0aec0;
      }
      .empty-state h3 {
        font-size: 24px;
        margin-bottom: 10px;
        color: #718096;
      }
      .field-hint {
        font-size: 11px;
        color: #718096;
        margin-top: 4px;
      }
      .confirm-modal {
        max-width: 450px;
        text-align: center;
      }
      .confirm-modal p {
        font-size: 15px;
        line-height: 1.6;
        color: #a0aec0;
        margin: 20px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🌌 关卡管理后台</h1>
        <div class="header-actions">
          <a href="/" class="btn btn-secondary">← 返回游戏</a>
          <button class="btn btn-success" id="btn-create">+ 新建关卡</button>
        </div>
      </div>

      <div class="status-bar">
        <div class="status-indicator">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">连接中...</span>
        </div>
        <div>
          <span style="color: #a0aec0;">当前关卡数: </span>
          <span id="levels-count" style="color: #a0c4ff; font-weight: bold;">0</span>
        </div>
      </div>

      <div class="levels-grid" id="levels-grid">
        <div class="empty-state">
          <h3>加载中...</h3>
          <p>正在获取关卡数据</p>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="form-modal">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modal-title">新建关卡</h2>
          <button class="close-btn" id="close-modal">&times;</button>
        </div>

        <div class="validation-errors" id="validation-errors">
          <h4>⚠️ 数据校验失败</h4>
          <ul id="errors-list"></ul>
        </div>

        <form id="level-form">
          <div class="form-row">
            <div class="form-group">
              <label>关卡名称</label>
              <input type="text" name="name" required maxlength="50" placeholder="例如：苍穹神龙" />
            </div>
            <div class="form-group">
              <label>神话生物名称</label>
              <input type="text" name="creatureName" required maxlength="30" placeholder="例如：苍龙" />
            </div>
          </div>

          <div class="form-group">
            <label>生物描述</label>
            <textarea name="creatureDescription" required maxlength="500" placeholder="描述这个神话生物的故事..."></textarea>
          </div>

          <h3 class="section-title">🌟 锚点配置 (至少3个)</h3>
          <div class="list-container" id="anchors-container"></div>
          <button type="button" class="add-btn" id="add-anchor">+ 添加锚点</button>

          <h3 class="section-title">🔗 边配置 (至少1条)</h3>
          <div class="list-container" id="edges-container"></div>
          <button type="button" class="add-btn" id="add-edge">+ 添加边</button>

          <h3 class="section-title">⚙️ 环境配置</h3>
          <div class="form-row-3">
            <div class="form-group">
              <label>基础光污染强度</label>
              <input type="number" name="lightBase" step="0.01" min="0" max="1" value="0.15" />
              <div class="field-hint">0 - 1 之间</div>
            </div>
            <div class="form-group">
              <label>光污染变化幅度</label>
              <input type="number" name="lightVariability" step="0.01" min="0" max="1" value="0.1" />
              <div class="field-hint">0 - 1 之间</div>
            </div>
            <div class="form-group">
              <label>光污染变化速度</label>
              <input type="number" name="lightSpeed" step="0.01" min="0" value="0.5" />
            </div>
          </div>

          <div class="form-group">
            <label>旋转速度</label>
            <input type="number" name="rotationSpeed" step="0.00001" value="0.0001" />
            <div class="field-hint">建议范围：0.00005 - 0.0002</div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="cancel-btn">取消</button>
            <button type="button" class="btn" id="validate-btn">校验数据</button>
            <button type="submit" class="btn btn-success" id="save-btn">保存</button>
          </div>
        </form>
      </div>
    </div>

    <div class="modal-overlay" id="confirm-modal">
      <div class="modal confirm-modal">
        <div class="modal-header">
          <h2>确认删除</h2>
          <button class="close-btn" id="close-confirm">&times;</button>
        </div>
        <p id="confirm-text">确定要删除这个关卡吗？此操作无法撤销。</p>
        <div class="modal-footer" style="justify-content: center;">
          <button class="btn btn-secondary" id="confirm-cancel">取消</button>
          <button class="btn btn-danger" id="confirm-delete">确认删除</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module" src="/src/admin.ts"></script>
  </body>
</html>
